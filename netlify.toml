# Netlify configuration — nearblack.com
# Static site served from the repo root, plus one serverless function
# (the contact form). Clean URLs and the 404 page are handled by Netlify
# automatically (it serves /pricing from pricing.html and 404.html on misses).

[build]
  publish = "."
  functions = "netlify/functions"

# The contact form posts to /api/contact. Route that to the function so the
# existing front-end fetch keeps working without any change.
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

# Never cache the contact endpoint's response.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
